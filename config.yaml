# OpenAI API key (for embeddings only)
openai_api_key: ${OPENAI_API_KEY}

# Embedding settings
embedding:
  model: text-embedding-3-small

# Generation settings
generation:
  model: gpt-4o-mini

# ChromaDB settings
chroma:
  persist_directory: ./chroma_db
  collection_name: knowledge_base

# Chunking settings
chunking:
  chunk_size: 1000
  chunk_overlap: 200

# Confluence settings
confluence:
  url: https://channelvas.atlassian.net/wiki
  username: george.ladakis@channelvas.com
  api_token: ${CONFLUENCE_API_TOKEN}
  space_key: FEATURECALCDAG

# Git repositories to index
git:
  repos:
    - path: /home/gladakis/feature_calculator_dag
      branch: release/v1.0.0
      extensions: [".md", ".py", ".txt", ".yaml", ".yml", ".py.jinja", ".jinja"]